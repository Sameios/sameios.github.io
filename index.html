<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SloMemo - Developer Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #13131a;
      --accent: #7c6af7;
      --accent2: #f7a26a;
      --text: #e8e8f0;
      --muted: #6b6b80;
      --border: #1e1e2e;
    }

    body {
      font-family: 'Zen Kaku Gothic New', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.4;
      z-index: 0;
    }

    .glow {
      position: fixed;
      width: 600px; height: 600px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(124,106,247,0.12) 0%, transparent 70%);
      top: -200px; left: -200px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      width: 100%;
    }

    .badge {
      display: inline-block;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--accent);
      border: 1px solid var(--accent);
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      letter-spacing: 0.1em;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s ease both;
    }

    h1 {
      font-size: 3rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1;
      animation: fadeUp 0.6s ease 0.1s both;
    }

    h1 span {
      color: var(--accent);
    }

    .tagline {
      margin-top: 1rem;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      margin: 2rem auto;
      animation: fadeUp 0.6s ease 0.3s both;
    }

    .links {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      animation: fadeUp 0.6s ease 0.4s both;
    }

    .link-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.6rem 1.2rem;
      border-radius: 8px;
      font-size: 0.85rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.15s, opacity 0.15s;
    }

    .link-btn:hover { transform: translateY(-2px); opacity: 0.85; }

    .link-btn.primary {
      background: var(--accent);
      color: #fff;
    }

    .link-btn.secondary {
      background: var(--surface);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .footer {
      margin-top: 3rem;
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      animation: fadeUp 0.6s ease 0.5s both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="glow"></div>
  <div class="container">
    <div class="badge">iOS App</div>
    <h1>Slo<span>Memo</span></h1>
    <p class="tagline">パチンコ・スロットの<br>データを手軽に記録・管理するアプリ</p>
    <div class="divider"></div>
    <div class="links">
      <a class="link-btn primary" href="https://apps.apple.com/jp/app/slomemo/id6759389011">
        ▸ App Store
      </a>
      <a class="link-btn secondary" href="https://sameios.github.io/SlotMemo-support/support.html">
        サポート
      </a>
    </div>
    <p class="footer">© 2026 YusekeKinoshita</p>
  </div>
</body>
</html>
